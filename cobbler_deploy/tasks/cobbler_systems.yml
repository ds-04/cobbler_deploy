# N.B. if DNS enabled site and you want to use localhost define Cobbler_dns_name for it:
#[local]
#localhost Cobbler_dns_name=localhost ansible_connection=local


- block:

   - name: Check system exists already
     ansible.builtin.command: cobbler system report --name={{ hostvars[item].inventory_hostname }}
     ignore_errors: true
     changed_when: "'No system' in system_check.stdout"
     register: system_check
     loop: "{{ groups['all'] }}"

   # because we use system_check dict we can't easily grab variables found in inventory
   - name: Cobbler system add - name/hostname/netboot(N), the next step will update the system object further
     ansible.builtin.command:
       argv:
         - cobbler
         - system
         - add
         - --name={{ item.item }}
         - --hostname={{ item.item }}
         - --netboot-enabled==N
         - --profile={{ Default_cobbler_profile }}
     when: item.changed
     # influenced by check, so only add what is needed to add the system
     loop: "{{ system_check.results }}"
   
   - name: Cobbler system edit - Ensure default interface removed if Default_cobbler_interface is defined
     ansible.builtin.command:
       argv:
         - cobbler
         - system
         - edit
         - --name={{ hostvars[item].inventory_hostname }}
         - --interface=default
         - --delete
     when:
       - Default_cobbler_interface is defined
     loop: "{{ groups['all'] }}"
     ignore_errors: true

   - name: Cobbler system edit (site Cobbler DNS enabled) - Ensure any ansible inventory changes are realised (will not remove)
     ansible.builtin.command:
       argv:
         - cobbler
         - system
         - edit
         - --name={{ hostvars[item].inventory_hostname }}
         - --hostname={{ hostvars[item].inventory_hostname }}
         - --dns-name={{ hostvars[item].Cobbler_dns_name | default(hostvars[item].inventory_hostname ~ "." ~ Default_cobbler_domain) }}
         - --netboot-enabled==N
         - --profile={{ hostvars[item].Cobbler_profile | default(Default_cobbler_profile) }}
         - --mac={{ hostvars[item].Cobbler_mac | default('') }}
         - --interface={{ hostvars[item].Cobbler_interface | default(Default_cobbler_interface) }}
         - --dhcp-tag={{ hostvars[item].Cobbler_dhcptag | default('') }}
         - --ip-address={{ hostvars[item].ansible_host | default('') }}
         - --netmask={{ hostvars[item].Cobbler_netmask | default(Default_cobbler_netmask) }}
         - --gateway={{ hostvars[item].Cobbler_gateway | default(Default_cobbler_gateway) }}
     loop: "{{ groups['all'] }}"
     when: Default_cobbler_domain is defined
     loop_control:
      pause: 2

   - name: Cobbler system edit (site Cobbler DNS disabled) - Ensure any ansible inventory changes are realised (will not remove)
     ansible.builtin.command: 
       argv:
         - cobbler
         - system
         - edit
         - --name={{ hostvars[item].inventory_hostname }}
         - --hostname={{ hostvars[item].inventory_hostname }}
         # don't do dns-name here - SITE WANTS DNS DISABLED
         - --netboot-enabled==N
         - --profile={{ hostvars[item].Cobbler_profile | default(Default_cobbler_profile) }}
         - --mac={{ hostvars[item].Cobbler_mac | default('') }}
         - --interface={{ hostvars[item].Cobbler_interface | default('') }}
         - --dhcp-tag={{ hostvars[item].Cobbler_dhcptag | default('') }}
         - --ip-address={{ hostvars[item].Cobbler_ipaddress | default('') }}
         - --netmask={{ hostvars[item].Cobbler_netmask | default('') }}
         - --gateway={{ hostvars[item].Cobbler_gateway | default(Default_cobbler_gateway) }}
     loop: "{{ groups['all'] }}" # always, so loop everything (not influenced by check)
     when: Default_cobbler_domain is not defined
     loop_control:
      pause: 2

  # TODO create something to compare existing ansible inventory to cobbler inventory and action those out-of-sync items (e.g. remove extras in cobbler)

   - name: Cobbler sync
     ansible.builtin.command: cobbler sync
     register: sync_comm

  become: true
...
